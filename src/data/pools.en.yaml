# Entity pools for the `en` locale. Loaded by src/providers.py at import.
#
# Item entries are mapped to (plural, singular, min_price, max_price) tuples
# by the loader, preserving the order producers and consumers expect.
# Adding a new locale: copy this file to pools.<lang>.yaml and translate.


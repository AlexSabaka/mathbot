metadata:
  id: k4_easy_properties_add_associative_01
  version: "1.0.0"
  author: Alex Sabaka
  created: 2026-01-30
  grade: 4
  topic: arithmetic.properties
  family: properties
  difficulty: easy
  steps: 4
  tags: [addition, associative, properties]

variables:
  a:
    type: integer
    min: 5
    max: 20
  b:
    type: integer
    min: 5
    max: 20
  c:
    type: integer
    min: 5
    max: 20
  Answer:
    type: string

template: |
  Calculate using the associative property:
  ({{a}} + {{b}}) + {{c}} = {{a}} + ({{b}} + {{c}})
  Show that both sides are equal.

solution: |
  # Calculate left side: (a + b) + c
  left_inner = a + b
  left_result = left_inner + c

  # Calculate right side: a + (b + c)
  right_inner = b + c
  right_result = a + right_inner

  # Create the answer showing both calculations
  Answer = f"Left side: ({a} + {b}) + {c} = {left_inner} + {c} = {left_result}. Right side: {a} + ({b} + {c}) = {a} + {right_inner} = {right_result}. Both sides equal {left_result}."

tests:
  - seed: 12345
    expected:
      answer: "Left side: (18 + 5) + 14 = 23 + 14 = 37. Right side: 18 + (5 + 14) = 18 + 19 = 37. Both sides equal 37."

  - seed: 67890
    expected:
      answer: "Left side: (11 + 9) + 18 = 20 + 18 = 38. Right side: 11 + (9 + 18) = 11 + 27 = 38. Both sides equal 38."

template: 'A rectangular picture frame has a perimeter of {{perimeter}} inches.


  If the length is {{length}} inches, what is the width?


  Please solve this problem.

  '
solution: '# Perimeter = 2 × (length + width)

  # perimeter = 2 × (length + width)

  # width = (perimeter / 2) - length

  Answer = (perimeter // 2) - length

  '

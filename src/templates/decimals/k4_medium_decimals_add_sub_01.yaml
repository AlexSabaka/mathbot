    type: money
    min: 5.0
    max: 20.0
    step: 0.25
  item2:
    type: item
    category: online
    plural: false
  price2:
    type: money
    min: 1.0
    max: 9.99
    step: 0.25
  bill:
    type: integer
    min: 20
    max: 50
  Answer1:
    type: money
  Answer2:
    type: money
template: '{{name}} bought a {{item1}} for {{price1}} and a {{item2}} for {{price2}}.


  How much did {{name}} spend in total?

  How much change from ${{bill}}.00 will {{name}} receive?

  '
solution: "# Calculate total spent\ntotal_spent = price1 + price2\n\n# Ensure bill is greater than total\nbill_amount = float(bill)\nwhile bill_amount < total_spent:\n    bill_amount += 10\n\n# Calculate change\nchange = bill_amount - total_spent\n\nAnswer1 = round(total_spent, 2)\nAnswer2 = round(change, 2)\n"
tests:
  - seed: 12345
    expected:
      answer: $22.50 | $5.50
  - seed: 67890
    expected:
      answer: $16.00 | $28.00

metadata:
  id: k1_hard_addition_01
  version: "1.1.0"
  author: Mathbot
  created: 2026-01-30
  grade: 1
  topic: arithmetic.addition
  family: addition
  difficulty: hard
  steps: 1
  culture: en-US
  tags: [addition, word-problem, two-addends]
  notes: |
    γ.4r single-step redesign: previously a 3-addend
    (num_a + num_b + num_c) problem flagged by k1.6 grader. K1 hard
    tier differs from medium/easy in number magnitude (still K1
    range), not step count. Now a 2-addend "X has A, Y has B,
    how many in all" pairing. Distinct from variant `_02`
    (single-actor "has + gets more") in narrative framing.

variables:
  name_a:
    type: person
  name_b:
    type: person
  num_a:
    type: integer
    min: 5
    max: 12
  num_b:
    type: integer
    min: 4
    max: 8
  object:
    type: item
    category: online
  Answer:
    type: integer

template: |
  {{name_a}} has {{num_a}} {{object}}. {{name_b}} has {{num_b}} {{object}}.

  How many {{object}} in all?

solution: |
  Answer = num_a + num_b

tests:
  - seed: 42
    expected:
      answer: '11'
  - seed: 100
    expected:
      answer: '17'

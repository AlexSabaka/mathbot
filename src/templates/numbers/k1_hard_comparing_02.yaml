metadata:
  id: k1_hard_comparing_02
  version: "1.0.0"
  author: Mathbot
  created: 2026-01-30
  grade: 1
  topic: numbers.comparing
  family: comparing
  difficulty: hard
  steps: 3
  culture: en-US
  tags: [numbers, comparing, ordering, sorting, descending]

variables:
  num_a:
    type: integer
    choices: [1, 6, 11, 16]
  num_b:
    type: integer
    choices: [2, 7, 12, 17]
  num_c:
    type: integer
    choices: [3, 8, 13, 18]
  num_d:
    type: integer
    choices: [4, 9, 14, 19]
  num_e:
    type: integer
    choices: [5, 10, 15, 20]
  Answer:
    type: string

template: |
  Put these numbers in order from biggest to smallest: {{num_a}}, {{num_b}}, {{num_c}}, {{num_d}}, {{num_e}}

solution: |
  numbers = sorted([num_a, num_b, num_c, num_d, num_e], reverse=True)
  Answer = ', '.join(str(n) for n in numbers)

tests:
  - seed: 42
    expected:
      answer: "13, 10, 9, 2, 1"
  - seed: 100
    expected:
      answer: "20, 18, 17, 9, 6"

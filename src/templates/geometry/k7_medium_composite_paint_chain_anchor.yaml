metadata:
  id: k7_medium_composite_paint_chain
  version: "1.0.0"
  author: Mathbot
  created: 2026-04-22
  grade: 7
  topic: geometry.area_composite
  family: area_perimeter_chain
  difficulty: medium
  steps: 5
  culture: en-US
  tags: [area_perimeter_chain, composite_figure, paint, ceiling, multi_step]
  notes: >
    Proposal 2.3.6 from problem-proposals.md.
    L-shaped room: rectangular footprint with a smaller rectangular alcove
    cut out. Compute the L-shape area, divide by paint coverage to get cans
    (rounded UP), multiply by cost per can. Tests composite-figure
    decomposition + ceiling function + unit chaining — three reasoning moves
    in sequence.

variables:
  name:
    type: person
  outer_length:
    type: integer
    min: 8
    max: 14
  outer_width:
    type: integer
    min: 6
    max: 11
  alcove_length:
    type: integer
    min: 2
    max: 4
  alcove_width:
    type: integer
    min: 2
    max: 4
  coverage_per_can:
    type: integer
    choices: [12, 15, 20, 25]
  cost_per_can:
    type: integer
    choices: [18, 22, 25, 30, 35]
  Answer:
    type: string

template: |
  {% set outer_area = outer_length * outer_width %}
  {% set alcove_area = alcove_length * alcove_width %}
  {% set total_area = outer_area - alcove_area %}
  {{name}} is painting an L-shaped room.
  The outer rectangular footprint is {{outer_length}} m by {{outer_width}} m, with a {{alcove_length}} m by {{alcove_width}} m rectangular alcove cut out of one corner.
  One can of paint covers {{coverage_per_can}} square meters, and each can costs ${{cost_per_can}}.
  How many cans of paint does {{name}} need to buy, and what is the total cost?

solution: |
  outer_area = outer_length * outer_width
  alcove_area = alcove_length * alcove_width
  total_area = outer_area - alcove_area
  cans_needed = -(-total_area // coverage_per_can)  # ceiling division
  total_cost = cans_needed * cost_per_can
  Answer = f"{cans_needed} cans, ${total_cost}"

tests:
  - seed: 12345
    expected:
      answer: "6 cans, $210"
  - seed: 42
    expected:
      answer: "6 cans, $210"
  - seed: 99
    expected:
      answer: "6 cans, $108"

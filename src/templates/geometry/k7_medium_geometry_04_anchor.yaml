metadata:
  id: k7_medium_geometry_04
  version: 1.0.0
  author: Alex Sabaka
  created: 2026-01-30
  grade: 7
  topic: geometry.circles
  family: geometry
  difficulty: medium
  steps: 3
  tags:
    - shapes
    - measurement
    - circles
    - area
    - circumference
variables:
  is_radius:
    type: boolean
    probability: 0.5
  dimension_value:
    type: decimal
    min: 3.0
    max: 15.0
    step: 0.5
  calculation_type:
    type: string
    choices:
      - circumference_only
      - both
      - area_only
      - cost
  cost_per_sqm:
    type: money
    min: 20.0
    max: 80.0
    step: 10.0
  Answer:
    type: decimal
  Answer1:
    type: length
  Answer2:
    type: area
template: 'A {{ "circular garden|round fountain|circular patio|circular pool|round pond" | choice }} has a {% if is_radius %}radius{% else %}diameter{% endif %} of {{dimension_value}}m.


  {% if calculation_type == ''circumference_only'' %}Using π = 3.14, what is the circumference?{% elif calculation_type == ''both'' %}The owner needs to know both the circumference for installing edging and the area for material coverage.


  Using π = 3.14, what are the circumference and area?{% elif calculation_type == ''area_only'' %}Using π = 3.14, what is the area?{% elif calculation_type == ''cost'' %}The project requires materials that cost {{cost_per_sqm}} per m².


  Using π = 3.14, what is the total cost to cover the area?{% endif %}

  '
solution: "pi = 3.14\n\nif is_radius:\n    radius = dimension_value\nelse:\n    radius = dimension_value / 2\n\ncircumference = 2 * pi * radius\narea = pi * radius * radius\n\nif calculation_type == 'circumference_only':\n    Answer = round(circumference, 2)\nelif calculation_type == 'both':\n    Answer1 = round(circumference, 2)\n    Answer2 = round(area, 2)\nelif calculation_type == 'area_only':\n    Answer = round(area, 2)\nelif calculation_type == 'cost':\n    total_cost = area * cost_per_sqm\n    Answer = round(total_cost, 2)\n"
tests:
  - seed: 12345
    expected:
      answer: '28.26'

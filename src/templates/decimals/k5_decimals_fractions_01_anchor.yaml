variables:
  decimal_val:
    type: string
    ranges:
      easy: {choices: ["0.25", "0.50", "0.75"]}
      medium: {choices: ["0.125", "0.375", "0.625", "0.875"]}
  Answer:
    type: string

template: |
  Convert {{decimal_val}} to a fraction in simplest form.

solution: |
  # Map decimal strings to simplified fractions
  conversions = {
      "0.25":  "1/4",
      "0.50":  "1/2",
      "0.75":  "3/4",
      "0.125": "1/8",
      "0.375": "3/8",
      "0.625": "5/8",
      "0.875": "7/8",
  }
  Answer = conversions[decimal_val]

tests:
  - seed: 12345
    difficulty: easy
    expected:
      answer: "1/2"
  - seed: 12345
    difficulty: medium
    expected:
      answer: "7/8"

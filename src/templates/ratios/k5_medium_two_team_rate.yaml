metadata:
  id: k5_medium_two_team_rate
  version: "1.0.0"
  author: Mathbot
  created: 2026-04-22
  grade: 5
  topic: ratios.proportions
  family: multi_person_sharing
  difficulty: medium
  steps: 5
  culture: en-US
  tags: [multi_person_sharing, rate_time, throughput]
  notes: >
    Proposal 2.1.3 from problem-proposals.md.
    Two teams with different sizes and per-person rates work for a fixed
    duration. Compute each team's total throughput and the combined total.
    Bridges multi_person_sharing and rate_time families.

variables:
  team_a_size:
    type: integer
    min: 3
    max: 6
  team_a_rate:
    type: integer
    choices: [2, 3, 4, 5]
  team_b_size:
    type: integer
    min: 4
    max: 8
  team_b_rate:
    type: integer
    choices: [2, 3, 4]
  days:
    type: integer
    choices: [3, 4, 5, 7]
  Answer:
    type: string

template: |
  Crew A has {{team_a_size}} painters, each painting {{team_a_rate}} fence panels per day.
  Crew B has {{team_b_size}} painters, each painting {{team_b_rate}} fence panels per day.
  Both crews work for {{days}} days.
  How many panels does crew A paint, how many does crew B paint, and what is the combined total?

solution: |
  a_total = team_a_size * team_a_rate * days
  b_total = team_b_size * team_b_rate * days
  combined = a_total + b_total
  Answer = f"crew A: {a_total}, crew B: {b_total}, combined: {combined}"

tests:
  - seed: 12345
    expected:
      answer: "crew A: 48, crew B: 72, combined: 120"
  - seed: 42
    expected:
      answer: "crew A: 24, crew B: 48, combined: 72"
  - seed: 99
    expected:
      answer: "crew A: 120, crew B: 80, combined: 200"

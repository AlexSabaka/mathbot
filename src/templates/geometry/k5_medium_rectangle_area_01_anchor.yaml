variables:
  room_type:
    type: string
    choices:
      - bedroom
      - living room
      - classroom
      - office
  area:
    type: integer
    min: 120
    max: 200
    step: 10
  length:
    type: integer
    min: 12
    max: 20
  Answer1:
    type: string
  Answer2:
    type: string
template: 'A rectangular {{room_type}} has an area of {{area}} ft² and a length of {{length}} feet.

  What is the width and perimeter?

  '
solution: '# Area = length × width, so width = area / length

  width = area // length


  # Perimeter = 2 × (length + width)

  perimeter = 2 * (length + width)


  Answer1 = f"{width} feet"

  Answer2 = f"{perimeter} feet"

  '

template: '{{name1}} and {{name2}} went shopping together. {{name1}} bought {{item1}} for {{price1}}, {{item2}} for {{price2}}, and {{item3}} for {{price3}}. {{name2}} bought {{item4}} for {{price4}} and {{item5}} for {{price5}}. They had a coupon for {{coupon}}% off the total purchase and paid {{tax}}% sales tax after the discount. {{ "What was their final total?|How much did they pay in total?|What was the final amount they paid?" | choice }}

  '
solution: 'person1_total = price1 + price2 + price3

  person2_total = price4 + price5

  subtotal = person1_total + person2_total

  discount_amount = subtotal * (coupon / 100)

  after_discount = subtotal - discount_amount

  tax_amount = after_discount * (tax / 100)

  Answer = after_discount + tax_amount

  '
tests:
  - seed: 12345
    expected:
      answer: $36.77
